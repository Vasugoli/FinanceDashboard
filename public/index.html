<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta
      name="description"
      content="Flux | Financial Control Redefined - A modern financial dashboard"
    />
    <title>Flux | Financial Control Redefined</title>
    <script>
      // Handle any redirect from 404.html (GitHub Pages SPA hack)
      const redirect = sessionStorage.redirect;
      if (redirect) {
        delete sessionStorage.redirect;
        const path = redirect.replace(/^\/FinanceDashboard/, '').replace(/\/$/, '') || '/';
        window.history.replaceState(null, null, '/FinanceDashboard' + path);
      }
    </script>
  </head>
  <body class="bg-[#0d0d0d] text-white">
    <div id="root"></div>
    <script type="module">
      // The deployment script placeholder (GitHub Pages) or local main entry
      import('/FinanceDashboard/assets/main.js')
        .catch(err => {
          console.error('Failed to load application:', err);
          // If the fixed main.js fails, we ignore it here as the deployment script handles hashed names
        });
    </script>
  </body>
</html>
